server:
  port: 8080

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/video_summary?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver
  data:
    redis:
      host: localhost
      port: 6379

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      logic-delete-field: deleted

app:
  internal-secret: change-me-in-production
  ai-service:
    url: http://localhost:8000
  bilibili:
    cookie: your-bilibili-cookie-here
  video:
    duration-limit-minutes: 30

sa-token:
  token-name: token
  timeout: 604800
  active-timeout: -1
  is-concurrent: true
  is-share: true
  token-style: uuid
  is-log: false
