server:
  port: 8080

spring:
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      logic-delete-field: deleted

sa-token:
  token-name: token
  timeout: 604800
  active-timeout: -1
  is-concurrent: true
  is-share: true
  token-style: uuid
  is-log: false

app:
  internal-secret: ${INTERNAL_SECRET:change-me-in-production}
  ai-service:
    url: ${AI_SERVICE_URL:http://localhost:8000}
  bilibili:
    cookie: ${BILIBILI_COOKIE:}
  video:
    duration-limit-minutes: 30
